@for (student of students; track student.name; let i = $index) {
    <h4>
        <span> {{i+1}} </span>
        <span> {{student.name}} </span>
        <span> {{student.age}} </span>
        <span> {{student.email}} </span>
        <button (click)="getInfo(student.name)"> get Name </button>
    </h4>
}
