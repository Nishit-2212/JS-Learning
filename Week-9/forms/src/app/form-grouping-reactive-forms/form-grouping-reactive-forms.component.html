<p>form-grouping-reactive-forms works!</p>

<form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
    <input type="text" placeholder="enter Name" formControlName="name">
    <span *ngIf="name?.hasError('required') && name?.touched"> *Name is required </span>
    <span class="error" *ngIf="name?.invalid && (name?.dirty || name?.touched)"> Provide enter username</span>
    <br><br>
    <input type="text" placeholder="enter Email" formControlName="email">
    <span *ngIf="email?.hasError('required') && email?.touched"> *Email is required </span>
    <span class="error" *ngIf="email?.invalid && (email?.dirty || email?.touched)"> Provide valid email</span>
    <br><br>
    <input type="text" placeholder="enter password" formControlName="password">
    <span *ngIf="password?.hasError('required') && password?.touched"> *Password is required </span>
    <br><br>
    <button>Submit</button>
</form>
