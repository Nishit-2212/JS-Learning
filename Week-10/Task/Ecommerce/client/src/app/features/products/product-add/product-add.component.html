<h1 id="form-title">Create Product</h1>
    <form id="create-form" #productForm="ngForm" (ngSubmit)="createProduct(productForm)">

        <label for="product-title">Product Title:</label>
        <input type="text" id="title" name="title" maxlength="10" #title="ngModel" required ngModel>
        <br>

        <label for="product-description">Description:</label>
        <textarea id="description" name="description" rows="3" maxlength="50" #description="ngModel" required ngModel></textarea>
        <br>

        <!-- <label for="product-category">Category:</label>
        <select id="category" name="category" required>
            <option value="">Select a category</option>
        </select>
        <br> -->

        <label for="product-category">Category:</label>
        <input type="text" id="category" name="category" #category="ngModel" required ngModel>
        <br>

        <label for="product-price">Product Price:</label>
        <input type="number" id="price" name="price" max="999999" #price="ngModel" required ngModel>
        <br>

        <label for="product-stock">Stock:</label>
        <input type="number" id="stock" name="stock" max="1000" #stock="ngModel" required ngModel>
        <br>

        

        <label for="product-image">Image URL:</label>
        <input type="text" id="imageUrl" name="imageUrl" #image="ngModel" ngModel>

        <br>
        <br>

        <div id="btn">
        <button type="submit" id="submitBtn" value="createProduct">Create Product</button>
        </div>
    </form>
