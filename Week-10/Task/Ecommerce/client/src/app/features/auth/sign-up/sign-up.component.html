<div class="signup-container">
    <h2>Sign Up</h2>
    <form id="signupForm" #userForm="ngForm" (ngSubmit)="signupUser(userForm)">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" #username='ngModel' required ngModel>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" #email='ngModel' required ngModel>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" #password='ngModel' #required ngModel>

        <button type="submit">Sign Up</button>
    </form>
    login existing user? <a routerLink="/login">Login</a>
</div>
